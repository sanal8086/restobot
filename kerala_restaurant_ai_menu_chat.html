*{box-sizing:border-box;margin:0;padding:0}

.bot-avatar{width:28px;height:28px;border-radius:50%;background:#c05c28;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#fff;font-weight:500}

.progress-bar{height:3px;background:var(--color-border-tertiary);margin:0}
.progress-fill{height:100%;background:#c05c28;transition:width 0.4s ease}
.step-label{padding:6px 12px 0;font-size:11px;color:var(--color-text-tertiary);text-align:center}
.dish-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color 0.15s}

.dish-card.chosen{border:1.5px solid #c05c28;background:#fff8f5}
.dish-icon{font-size:24px;flex-shrink:0}
.dish-info .dname{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.dish-info .ddesc{font-size:11px;color:var(--color-text-secondary);margin-top:2px}

.tag.spice{background:#faece7;color:#712b13}
.tag.diet{background:#e1f5ee;color:#085041}
.tag.promo{background:#eeedfe;color:#3c3489}

.total-btn{width:100%;margin-top:10px;padding:11px;background:#c05c28;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer}

.typing span{width:6px;height:6px;border-radius:50%;background:var(--color-border-secondary);animation:bounce 1.2s infinite}

const steps = ['diet','cuisine','spice','hunger','starter','main','bread','rice','dessert','confirm'];
const totalSteps = steps.length;

function updateProgress(){
  const pct = Math.round((state.step / (totalSteps-1)) * 100);
  prog.style.width = pct + '%';
  const labels = ['','','','','Starters','Main Course','Bread','Rice','Desserts','Your Meal'];
  stepLbl.textContent = labels[state.step] || 'Your Meal';
}

function scrollDown(){
  setTimeout(()=>{ M.scrollTop = M.scrollHeight; },80);
}

function addBotMsg(html, delay=0){
  return new Promise(res=>{
    setTimeout(()=>{
      const typing = document.createElement('div');
      typing.className='bubble-wrap bot';
      typing.innerHTML='<div class="bot-avatar">SG</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>';
      M.appendChild(typing);
      scrollDown();
      setTimeout(()=>{
        typing.remove();
        const wrap=document.createElement('div');
        wrap.className='bubble-wrap bot';
        wrap.innerHTML=`<div class="bot-avatar">SG</div><div class="bubble bot">${html}</div>`;
        M.appendChild(wrap);
        scrollDown();
        res();
      },700);
    },delay);
  });
}

function addUserMsg(txt){
  const wrap=document.createElement('div');
  wrap.className='bubble-wrap user';
  wrap.innerHTML=`<div class="bubble user">${txt}</div>`;
  M.appendChild(wrap);
  scrollDown();
}

function addOptions(opts, onPick){
  const wrap=document.createElement('div');
  wrap.className='options-wrap';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt-btn';
    b.innerHTML=o.label;
    b.onclick=()=>{
      wrap.querySelectorAll('.opt-btn').forEach(x=>x.classList.add('disabled'));
      b.classList.add('selected');
      onPick(o);
    };
    wrap.appendChild(b);
  });
  M.appendChild(wrap);
  scrollDown();
}

function addDishCards(dishes, onPick, multi=false){
  const chosen=[];
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;gap:7px;padding:4px 0 4px 34px';
  dishes.forEach(d=>{
    const card=document.createElement('div');
    card.className='dish-card';
    const tagHtml=d.tags.map(t=>{
      if(t==='pop') return '<span class="tag pop">&#128293; Popular</span>';
      if(t==='spicy') return '<span class="tag spice">&#127798; Spicy</span>';
      if(t==='medium') return '<span class="tag spice">&#127798; Medium</span>';
      if(t==='mild') return '<span class="tag diet">Mild</span>';
      return '';
    }).join('');
    const promoTag=d.promo?'<span class="tag promo">&#11088; Chef\'s pick</span>':'';
    card.innerHTML=`<div class="dish-icon">${d.icon}</div><div class="dish-info"><div class="dname">${d.n}</div><div class="ddesc">${d.d}</div><div class="dtags">${promoTag}${tagHtml}</div></div>`;
    card.onclick=()=>{
      if(!multi){
        wrap.querySelectorAll('.dish-card').forEach(x=>x.classList.remove('chosen'));
        card.classList.add('chosen');
        setTimeout(()=>{
          onPick(d);
        },350);
      } else {
        card.classList.toggle('chosen');
        const idx=chosen.findIndex(x=>x.n===d.n);
        if(idx>-1) chosen.splice(idx,1); else chosen.push(d);
      }
    };
    wrap.appendChild(card);
  });
  if(multi){
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.style.cssText='margin-left:34px;margin-top:4px;border-radius:var(--border-radius-md);width:calc(100% - 34px)';
    btn.textContent='Continue with selection ';
    btn.onclick=()=>{
      if(chosen.length===0) chosen.push(dishes[0]);
      onPick(chosen);
      btn.disabled=true;
      btn.style.opacity='0.5';
    };
    M.appendChild(wrap);
    M.appendChild(btn);
  } else {
    M.appendChild(wrap);
  }
  scrollDown();
}

async function startChat(){
  M.innerHTML='';
  state={diet:null,cuisine:null,spice:null,hunger:null,starter:null,main:null,bread:null,rice:null,dessert:null,step:0};
  updateProgress();
  await addBotMsg('<div class="hi">&#128075; Namaskaram! Welcome to Spice Garden</div>I\'m your personal menu guide. I\'ll help you build the perfect meal in just a few taps — no scrolling through a long menu!<br><br>Let\'s start with one simple question:',300);
  state.step=1; updateProgress();
  await addBotMsg('&#127869; Are you dining as <b>veg, non-veg, or mix</b> today?',800);
  addOptions([
    {label:'&#129367; Pure Veg',val:'veg'},
    {label:'&#129382; Non-Veg',val:'nonveg'},
    {label:'&#127858; Mix / Flexible',val:'mix'}
  ], async o=>{
    const label = o.label.replace(/&#\d+;/g,'').trim();
    addUserMsg(label);
    state.diet = o.val==='mix'?'nonveg':o.val;
    await askCuisine();
  });
}

    {label:'&#127810; Italian',val:'italian'}
  ], async o=>{
    addUserMsg(o.label.replace(/&#\d+;/g,'').trim());
    state.cuisine=o.val;
    await askSpice();
  });
}

async function askSpice(){
  state.step=3; updateProgress();
  await addBotMsg('&#127798; How bold do you want the flavours?',400);
  addOptions([
    {label:'&#129376; Mild & Gentle',val:'mild'},
    {label:'&#127798; Medium Kick',val:'medium'},
    {label:'&#128293; Full Spice',val:'spicy'}
  ], async o=>{
    addUserMsg(o.label.replace(/&#\d+;/g,'').trim());
    state.spice=o.val;
    await askHunger();
  });
}

async function askHunger(){
  state.step=3; updateProgress();
  await addBotMsg('&#129300; How hungry are you?',400);
  addOptions([
    {label:'&#128077; Light — starter only',val:'light'},
    {label:'&#129497; Moderate — starter + main',val:'moderate'},
    {label:'&#127857; Feast — full meal!',val:'full'}
  ], async o=>{
    addUserMsg(o.label.replace(/&#\d+;/g,'').trim());
    state.hunger=o.val;
    await showStarters();
  });
}

async function showStarters(){
  state.step=4; updateProgress();
  const dietKey=state.diet;
  const cuisineKey=state.cuisine;
  const dishes=MENU.starters[dietKey][cuisineKey]||[];
  await addBotMsg(`&#127862; Perfect! Here are your <b>${cuisineKey==='northindian'?'North Indian':cuisineKey.charAt(0).toUpperCase()+cuisineKey.slice(1)} starters</b> — tap to pick one:`,500);
  addDishCards(dishes, async d=>{
    state.starter=d;
    addUserMsg('&#10003; ' + d.n);
    if(state.hunger==='light'){
      await showFinal();
    } else {
      await showMains();
    }
  });
}

async function showMains(){
  state.step=5; updateProgress();
  const dishes=MENU.mains[state.diet][state.cuisine]||[];
  await addBotMsg(`&#129367; Now pick your <b>main course</b>:`,500);
  addDishCards(dishes, async d=>{
    state.main=d;
    addUserMsg('&#10003; ' + d.n);
    await showBreads();
  });
}

async function showBreads(){
  state.step=6; updateProgress();
  const dishes=MENU.breads[state.diet][state.cuisine]||[];
  await addBotMsg(`&#129360; Add a <b>bread</b> to go with it?`,500);
  const withSkip=[...dishes];
  addDishCards(withSkip, async d=>{
    state.bread=d;
    addUserMsg('&#10003; ' + d.n);
    await showRice();
  });
  const skipBtn=document.createElement('button');
  skipBtn.className='opt-btn';
  skipBtn.style.cssText='margin-left:34px;margin-top:4px';
  skipBtn.textContent='Skip bread';
  skipBtn.onclick=async()=>{
    skipBtn.classList.add('disabled');
    addUserMsg('No bread thanks');
    state.bread=null;
    await showRice();
  };
  M.appendChild(skipBtn);
  scrollDown();
}

async function showRice(){
  state.step=7; updateProgress();
  const dishes=MENU.rice[state.diet][state.cuisine]||[];
  await addBotMsg(`&#127859; Would you like a <b>rice dish</b>?`,500);
  addDishCards(dishes, async d=>{
    state.rice=d;
    addUserMsg('&#10003; ' + d.n);
    await showDesserts();
  });
  const skipBtn=document.createElement('button');
  skipBtn.className='opt-btn';
  skipBtn.style.cssText='margin-left:34px;margin-top:4px';
  skipBtn.textContent='Skip rice';
  skipBtn.onclick=async()=>{
    skipBtn.classList.add('disabled');
    addUserMsg('No rice thanks');
    state.rice=null;
    await showDesserts();
  };
  M.appendChild(skipBtn);
  scrollDown();
}

async function showDesserts(){
  if(state.hunger!=='full'){
    await showFinal(); return;
  }
  state.step=8; updateProgress();
  await addBotMsg(`&#127848; End on a sweet note? Pick a <b>dessert</b>:`,500);
  addDishCards(MENU.desserts, async d=>{
    state.dessert=d;
    addUserMsg('&#10003; ' + d.n);
    await showFinal();
  });
  const skipBtn=document.createElement('button');
  skipBtn.className='opt-btn';
  skipBtn.style.cssText='margin-left:34px;margin-top:4px';
  skipBtn.textContent='No dessert today';
  skipBtn.onclick=async()=>{
    skipBtn.classList.add('disabled');
    addUserMsg('No dessert today');
    state.dessert=null;
    await showFinal();
  };
  M.appendChild(skipBtn);
  scrollDown();
}

async function showFinal(){
  state.step=9; updateProgress();
  const comboLine = COMBOS[state.cuisine]?.[state.diet]?.[0] || '';
  await addBotMsg('&#127881; Your perfect meal is ready! Here\'s what we\'ve put together for you:',600);

  const rows=[];
  if(state.starter) rows.push({course:'Starter',item:state.starter.n,icon:state.starter.icon});
  if(state.main) rows.push({course:'Main Course',item:state.main.n,icon:state.main.icon});
  if(state.bread) rows.push({course:'Bread',item:state.bread.n,icon:state.bread.icon});
  if(state.rice) rows.push({course:'Rice',item:state.rice.n,icon:state.rice.icon});
  if(state.dessert) rows.push({course:'Dessert',item:state.dessert.n,icon:state.dessert.icon});

  const rowsHtml=rows.map(r=>`<div class="meal-row"><span class="course">${r.course}</span><span>${r.icon} ${r.item}</span></div>`).join('');

  const wrap=document.createElement('div');
  wrap.style.cssText='padding:0 0 0 34px';
  wrap.innerHTML=`<div class="meal-summary">
    <div class="ms-title">Your complete meal</div>
    ${rowsHtml}
    <div class="meal-row"><span class="course">Cuisine</span><span style="text-transform:capitalize">${state.cuisine==='northindian'?'North Indian':state.cuisine}</span></div>
    <button class="total-btn">&#9989; Confirm this meal</button>
  </div>`;
  wrap.querySelector('.total-btn').onclick=()=>{
    addUserMsg('&#9989; Confirmed! Let\'s eat!');
    showThankYou();
  };
  M.appendChild(wrap);
  scrollDown();

  if(comboLine){
    await addBotMsg(`&#128161; <b>Pro tip:</b> ${comboLine}`,900);
  }
}

async function showThankYou(){
  await addBotMsg('&#127881; Wonderful! Your order is on its way.<br><br>&#128150; Enjoy your meal at Spice Garden. Your food will be served fresh!',600);
  const rb=document.createElement('button');
  rb.className='restart-btn';
  rb.textContent='&#8635; Start over / order again';
  rb.onclick=()=>startChat();
  M.appendChild(rb);
  scrollDown();
}

startChat();
</script>
